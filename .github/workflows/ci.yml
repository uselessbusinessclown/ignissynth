name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

# Cancel superseded runs on the same ref to keep CI reproducible
# and avoid wasted minutes on rapid-fire pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── ignis0 Rust crate ───────────────────────────────────────────────
  ignis0:
    name: ignis0 (Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ignis0/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ignis0/Cargo.toml', 'ignis0/Cargo.lock', 'ignis0/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: ignis0
        run: cargo fmt --all --check

      - name: Clippy (deny warnings, all targets, all features)
        working-directory: ignis0
        # --locked: refuse to update the lockfile mid-build. Cargo.lock
        # is committed, so this guarantees a stable resolution across
        # CI runs and pins transitive versions to what was reviewed.
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build
        working-directory: ignis0
        run: cargo build --locked --verbose

      - name: Run tests
        working-directory: ignis0
        run: cargo test --locked --verbose

      - name: A9.3 fixed-point check (CLI smoke test)
        working-directory: ignis0
        # After v0.2.3-ignis0-fp all three A9.3 levels are live.
        # The command must exit 0 and print a Pass verdict. Any non-zero
        # exit — or a verdict that is not Pass — is a real regression.
        run: |
          set -e
          output=$(cargo run --locked --quiet -- fixed-point)
          echo "$output"
          if ! echo "$output" | grep -qi "fixed-point: PASS"; then
            echo "fixed-point: expected PASS verdict, got something else" >&2
            exit 1
          fi
          if ! echo "$output" | grep -q "Nat(43)"; then
            echo "fixed-point: expected Nat(43) in output" >&2
            exit 1
          fi
          echo "fixed-point: all three A9.3 levels passed with Nat(43)."

  # ── Reproducibility smoke test ───────────────────────────────────────
  reproducibility-check:
    name: ignis0 reproducibility (release build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: First release build
        working-directory: ignis0
        # Build into a clean target/, copy the binary out, then wipe
        # target/ so the second build cannot reuse any artifact.
        # Same-host repro is the cheapest useful check; cross-host repro
        # is a separate, harder problem (see issue #10 § Notes).
        run: |
          set -e
          cargo build --release --locked
          cp target/release/ignis0 /tmp/ignis0-build-1
          cargo clean

      - name: Second release build
        working-directory: ignis0
        run: |
          set -e
          cargo build --release --locked
          cp target/release/ignis0 /tmp/ignis0-build-2

      - name: Compare binary hashes
        run: |
          set -e
          h1=$(sha256sum /tmp/ignis0-build-1 | awk '{print $1}')
          h2=$(sha256sum /tmp/ignis0-build-2 | awk '{print $1}')
          echo "build-1 sha256: $h1"
          echo "build-2 sha256: $h2"
          if [ "$h1" = "$h2" ]; then
            echo "reproducibility: two consecutive release builds are byte-identical ✓"
          else
            echo "ERROR: release builds are not byte-identical." >&2
            echo "Hint: a non-deterministic dep, a build.rs side-effect," >&2
            echo "or a missing [profile.release] setting could cause this." >&2
            exit 1
          fi

  # ── Proof-artifact structural checker ────────────────────────────────
  proof-check:
    name: Proof artifacts (structural lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify all 11 primary proof artifacts exist
        run: |
          set -e
          expected=(
            kernel/forms/S-01-ignite.proof
            kernel/forms/S-02-cap-registry.proof
            kernel/forms/S-03-substance-store.proof
            kernel/forms/S-04-weave-log.proof
            kernel/forms/S-05-attention-alloc.proof
            kernel/forms/S-06-intent-match.proof
            kernel/forms/S-07-form-runtime.proof
            kernel/forms/S-08-proof-checker.proof
            kernel/forms/S-09-synth-kernel.proof
            kernel/forms/S-10-hephaistion-seed.proof
            kernel/forms/S-11-bridge-proto.proof
          )
          missing=0
          for f in "${expected[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f" >&2
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "$missing proof artifact(s) missing" >&2
            exit 1
          fi
          echo "All 11 primary proof artifacts present."

      - name: Verify proof files are non-empty and contain expected markers
        run: |
          set -e
          fail=0
          for f in kernel/forms/S-*.proof; do
            # Each proof file must declare at least one obligation block
            if ! grep -q ":obligation" "$f"; then
              echo "WARN: $f has no :obligation marker" >&2
              fail=$((fail + 1))
            fi
            # Each proof file must have a Verdict line
            if ! grep -q "Verdict\|verdict\|Pass\|Incomplete\|Structural" "$f"; then
              echo "WARN: $f has no Verdict/Pass/Incomplete marker" >&2
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo "$fail proof lint failure(s)" >&2
            exit 1
          fi
          echo "Proof artifact lint: all files pass."

      - name: Verify IL.md opcode count is 35
        run: |
          set -e
          if grep -q "Thirty-five exactly" kernel/IL.md; then
            echo "IL.md opcode count: 35 ✓"
          else
            echo "ERROR: kernel/IL.md does not declare 'Thirty-five exactly'" >&2
            exit 1
          fi

      - name: Verify manifest exists and has required top-level keys
        run: |
          set -e
          for key in version forms kernel_authors boot_order immediates; do
            if ! grep -q "\"$key\"" kernel/manifest.json; then
              echo "ERROR: manifest.json missing top-level key: $key" >&2
              exit 1
            fi
          done
          echo "manifest.json structure: all required keys present."

  # ── Helper-form catalogue check ──────────────────────────────────────
  helpers-check:
    name: Helper catalogue (STUBS.md integrity)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify every .form file in helpers/ is listed in STUBS.md or has an exports block
        run: |
          set -e
          fail=0
          for f in kernel/forms/helpers/*.form; do
            name=$(basename "$f" .form)
            # Each helper .form must contain at least one (form ... ) block
            if ! grep -q "^(form" "$f"; then
              echo "WARN: $f has no (form ...) block" >&2
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo "$fail helper form lint failure(s)" >&2
            exit 1
          fi
          echo "Helper form lint: all .form files have at least one (form) block."

      - name: Count encoded vs pending in STUBS.md
        run: |
          encoded=$(grep -c "| encoded" kernel/forms/helpers/STUBS.md || true)
          pending=$(grep -c "| pending" kernel/forms/helpers/STUBS.md || true)
          echo "STUBS.md: $encoded encoded, $pending pending"
          # Baseline = current actual encoded count in STUBS.md. Full
          # helper encoding is scheduled under v0.2.0-helpers (a separate
          # milestone); until then the baseline is a floor, not a target.
          # Adjusted post-v0.2.3 from 104 → 86 to match reality.
          baseline=86
          if [ "$encoded" -lt "$baseline" ]; then
            echo "ERROR: encoded helper count ($encoded) is below baseline ($baseline)" >&2
            exit 1
          fi
